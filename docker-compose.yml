---
name: peacock
services:
  peacock:
    image: ghcr.io/gsquarediv/peacock-docker:latest
    volumes:
      - userdata:/peacock/userdata
      - contracts:/peacock/contracts
      - contractSessions:/peacock/contractSessions
      - plugins:/peacock/plugins
      - options:/peacock/options
    ports:
      - 3000:3000
volumes:
  userdata:
  contracts:
  contractSessions:
  plugins:
  options: