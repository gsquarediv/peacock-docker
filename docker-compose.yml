---
name: peacock
services:
  peacock:
    image: ghcr.io/gsquarediv/peacock-docker:latest
    volumes:
      - userdata:/peacock/userdata
      - contractSessions:/peacock/contractSessions
      - plugins:/peacock/plugins
    ports:
      - 3000:80
volumes:
  userdata:
  contractSessions:
  plugins: